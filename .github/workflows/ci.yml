name: CI/CD — GEO.LINK Test Automation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ── 1. Backend Unit Tests (JUnit5 + Mockito) ──────────────────────────────
  backend-unit-tests:
    name: "Java Unit Tests (JUnit5 + Mockito)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests with Maven
        run: cd backend && mvn -B test --file pom.xml

      - name: Upload Surefire XML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 30

  # ── 2. Backend Build ───────────────────────────────────────────────────────
  backend-build:
    name: "Spring Boot Build"
    runs-on: ubuntu-latest
    needs: backend-unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests — already ran)
        run: cd backend && mvn -B package -DskipTests --file pom.xml

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # ── 3. Frontend Build ──────────────────────────────────────────────────────
  frontend-build:
    name: "React + Vite Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build React App
        run: cd frontend && npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── 4. API & UI Automation Tests (Playwright + TypeScript) ────────────────
  e2e-tests:
    name: "Playwright E2E & API Tests"
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: urlshortener
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # Download built artifacts from previous jobs
      - uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Start the Spring Boot backend
      - name: Start Backend
        run: |
          java -jar backend/target/*.jar \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/urlshortener \
            --spring.datasource.username=postgres \
            --spring.datasource.password=postgres \
            --spring.jpa.hibernate.ddl-auto=create-drop &
          echo "Waiting for backend to be ready..."
          timeout 60 bash -c 'until curl -sf http://localhost:8080/api/urls; do sleep 2; done'
          echo "Backend is ready."

      # Serve the built frontend via npx serve
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Serve Frontend
        run: npx serve -s frontend/dist -l 3000 &

      # Install Playwright test dependencies
      - name: Install Playwright dependencies
        run: |
          cd tests
          npm ci
          npx playwright install --with-deps chromium firefox

      # Run API tests (fast, no browser needed)
      - name: Run API Tests
        run: cd tests && npx playwright test tests/api --project=api
        env:
          API_BASE_URL: http://localhost:8080

      # Run UI tests on Chromium + Firefox
      - name: Run UI Tests (Chromium)
        run: cd tests && npx playwright test tests/ui --project=chromium-ui
        env:
          BASE_URL: http://localhost:3000
          API_BASE_URL: http://localhost:8080

      - name: Run UI Tests (Firefox)
        run: cd tests && npx playwright test tests/ui --project=firefox-ui
        env:
          BASE_URL: http://localhost:3000
          API_BASE_URL: http://localhost:8080

      # Upload Playwright HTML + Allure reports
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 30

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: tests/allure-results/
          retention-days: 30

      - name: Upload JUnit XML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-results
          path: tests/results/

  # ── 5. Docker Build Validation ─────────────────────────────────────────────
  docker-build:
    name: "Docker Compose Build Validation"
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose Build
        run: docker compose build
